services:
  orders-api-db:
    image: postgres:16
    container_name: orders-api-db
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - orders-api-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orders_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  orders-api-app:
    build: .
    image: orders-api:latest
    container_name: orders-api-app
    depends_on:
      orders-api-db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__Default: Host=orders-api-db;Port=5432;Database=orders_db;Username=postgres;Password=${DB_PASSWORD:-postgres}

volumes:
  orders-api-db-data:
