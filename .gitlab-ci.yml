stages:
  - build
  - test
  - deploy

image: mcr.microsoft.com/dotnet/sdk:8.0

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"

build:
  stage: build
  script:
    - dotnet restore
    - dotnet build --configuration Release --no-restore

test:
  stage: test
  script:
    - dotnet test tests/OrdersApi.Tests --configuration Release --logger "console;verbosity=normal"

deploy:
  stage: deploy
  image: docker:27
  script:
    - docker compose -p orders-api -f docker-compose.ci.yml down -v --remove-orphans || true
    - docker compose -p orders-api -f docker-compose.ci.yml up -d orders-api-db
    - until docker exec orders-api-db pg_isready -U postgres -d orders_db; do sleep 2; done
    - docker exec -i orders-api-db psql -U postgres -d orders_db < db/init.sql
    - docker exec -i orders-api-db psql -U postgres -d orders_db < db/procedures.sql
    - docker compose -p orders-api -f docker-compose.ci.yml up -d --build orders-api-app
  only:
    - main
